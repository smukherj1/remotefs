version: '3'

vars:
  HOST_UID:
    sh: id -u
  HOST_GID:
    sh: id -g

tasks:
  fmt:
    desc: Format the codebase
    cmds:
      - cargo fmt --all -- --check

  lint:
    desc: Lint the codebase
    cmds:
      - cargo clippy --workspace --all-targets -- -D warnings

  build:
    desc: Build both rfs and rfsd binaries
    cmds:
      - cargo build --workspace

  test:
    desc: Run all tests (unit and integration)
    cmds:
      - cargo test --workspace

  test:unit:
    desc: Run only unit tests
    cmds:
      - cargo test --workspace --lib

  proto:check:
    desc: Check that pinned REAPI, ByteStream, and RemoteFS control protos generate cleanly
    cmds:
      - cargo check

  proto:generate:
    desc: Generate Rust protobuf bindings into Cargo OUT_DIR during a normal build
    cmds:
      - cargo build

  cas:up:
    desc: Start the local bazel-remote CAS at grpc://127.0.0.1:9092
    cmds:
      - mkdir -p .dev/bazel-remote-cache
      - REMOTEFS_DOCKER_UID={{.HOST_UID}} REMOTEFS_DOCKER_GID={{.HOST_GID}} docker compose up -d bazel-remote

  cas:down:
    desc: Stop the local bazel-remote CAS
    cmds:
      - docker compose down

  cas:logs:
    desc: Follow local bazel-remote CAS logs
    cmds:
      - docker compose logs -f bazel-remote

  cas:reset:
    desc: Stop the local CAS and remove the disposable dev cache directory
    cmds:
      - docker compose down
      - rm -rf .dev/bazel-remote-cache
      - mkdir -p .dev/bazel-remote-cache

  test:integration:cas:
    desc: Verify the local bazel-remote CAS test prerequisite
    cmds:
      - cargo test -p rfs-common --test cas_prerequisites

  test:integration:upload:
    desc: Verify upload integration behavior against the local bazel-remote CAS
    cmds:
      - cargo test -p rfs --test upload_integration

  test:integration:state:
    desc: Verify local state and foreground daemon lifecycle behavior
    cmds:
      - cargo test -p rfs-common --test state_integration

  test:integration:daemon:
    desc: Verify Unix control socket and daemon lifecycle behavior
    cmds:
      - cargo test -p rfsd --test daemon_integration

  test:integration:readonly:
    desc: Verify lazy read-only filesystem behavior against local bazel-remote
    cmds:
      - cargo test -p rfsd --test readonly_integration

  test:e2e:readonly:
    desc: Verify the read-only FUSE workflow (requires local CAS and usable /dev/fuse)
    cmds:
      - cargo test -p rfsd --test readonly_e2e

  mount:readonly:
    desc: Mount ROOT at MOUNT through the local CAS for manual read-only testing
    requires:
      vars: [ROOT, MOUNT]
    cmds:
      - cargo run -p rfs -- --cas-url grpc://127.0.0.1:9092 --instance-name remotefs/fixtures mount {{.ROOT}} {{.MOUNT}}

  fixture:upload:
    desc: Upload the checked-in tree fixture to the local bazel-remote CAS
    cmds:
      - cargo run -p rfs -- --cas-url grpc://127.0.0.1:9092 --instance-name remotefs/fixtures upload tests/fixtures/tree-roundtrip

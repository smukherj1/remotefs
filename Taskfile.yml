version: '3'

vars:
  HOST_UID:
    sh: id -u
  HOST_GID:
    sh: id -g

tasks:
  fmt:
    desc: Format the codebase
    cmds:
      - cargo fmt --all -- --check

  lint:
    desc: Lint the codebase
    cmds:
      - cargo clippy --all-targets -- -D warnings

  build:
    desc: Build both rfs and rfsd binaries
    cmds:
      - cargo build

  test:
    desc: Run all tests (unit and integration)
    cmds:
      - cargo test

  test:unit:
    desc: Run only unit tests
    cmds:
      - cargo test --lib

  proto:check:
    desc: Check that pinned REAPI, ByteStream, and RemoteFS control protos generate cleanly
    cmds:
      - cargo check

  proto:generate:
    desc: Generate Rust protobuf bindings into Cargo OUT_DIR during a normal build
    cmds:
      - cargo build

  cas:up:
    desc: Start the local bazel-remote CAS at grpc://127.0.0.1:9092
    cmds:
      - mkdir -p .dev/bazel-remote-cache
      - REMOTEFS_DOCKER_UID={{.HOST_UID}} REMOTEFS_DOCKER_GID={{.HOST_GID}} docker compose up -d bazel-remote

  cas:down:
    desc: Stop the local bazel-remote CAS
    cmds:
      - docker compose down

  cas:logs:
    desc: Follow local bazel-remote CAS logs
    cmds:
      - docker compose logs -f bazel-remote

  cas:reset:
    desc: Stop the local CAS and remove the disposable dev cache directory
    cmds:
      - docker compose down
      - rm -rf .dev/bazel-remote-cache
      - mkdir -p .dev/bazel-remote-cache

  test:integration:cas:
    desc: Verify the local bazel-remote CAS test prerequisite
    cmds:
      - cargo test --test cas_prerequisites

  test:integration:upload:
    desc: Verify upload integration behavior against the local bazel-remote CAS
    cmds:
      - cargo test --test upload_integration

  test:integration:state:
    desc: Verify local state and foreground daemon lifecycle behavior
    cmds:
      - cargo test --test state_integration

  test:integration:daemon:
    desc: Verify Unix control socket and daemon lifecycle behavior
    cmds:
      - cargo test --test daemon_integration

  fixture:upload:
    desc: Upload the checked-in tree fixture to the local bazel-remote CAS
    cmds:
      - cargo run --bin rfs -- --cas-url grpc://127.0.0.1:9092 --instance-name remotefs/fixtures upload tests/fixtures/tree-roundtrip
